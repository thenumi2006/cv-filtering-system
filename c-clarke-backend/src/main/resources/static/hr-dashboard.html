<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Administration Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f9; }
        .card { border-radius: 8px; border: none; }
        .card-header { font-weight: bold; border-top-left-radius: 8px !important; border-top-right-radius: 8px !important; }
        .applicant-card { border-left: 5px solid #0d6efd; background-color: #ffffff; margin-bottom: 15px; }
        .profile-img-modal { width: 120px; height: 120px; object-fit: cover; border: 3px solid #0d6efd; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container-fluid px-4">
        <span class="navbar-brand mb-0 h1">HR Administration Portal</span>
        <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="card shadow-sm mb-5">
        <div class="card-header bg-success text-white py-3">Post a New Job Vacancy</div>
        <div class="card-body bg-white p-4">
            <div class="row">
                <div class="col-md-5">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Job Title</label>
                        <input type="text" class="form-control" id="jobTitle" placeholder="e.g. Java Developer">
                    </div>
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label fw-bold small">Required Skills</label>
                            <input type="text" class="form-control" id="skills" placeholder="Java, Spring Boot">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold small">Years Exp.</label>
                            <input type="number" class="form-control" id="experience" placeholder="2">
                        </div>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Job Description</label>
                        <textarea class="form-control" id="description" rows="5" placeholder="Job Description here..."></textarea>
                    </div>
                </div>
            </div>
            <div class="text-end"><button class="btn btn-success px-5" onclick="saveJob()">Publish Job Post</button></div>
            <div id="status" class="mt-3"></div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white py-3 d-flex justify-content-between align-items-center">
            <span>Received Applications</span>
            <button class="btn btn-light btn-sm" onclick="fetchJobs()">Refresh List</button>
        </div>
        <div class="card-body bg-light p-4" id="jobList"></div>
    </div>
</div>


<script>
    let isEditing = false;
    let currentEditId = null;

    window.onload = fetchJobs;

    async function saveJob() {
        const statusDiv = document.getElementById('status');
        const titleVal = document.getElementById('jobTitle').value.trim();
        const skillsVal = document.getElementById('skills').value.trim();
        const expVal = document.getElementById('experience').value.trim();
        const descVal = document.getElementById('description').value.trim();

        if (!titleVal || !skillsVal || !expVal || !descVal) {
            statusDiv.innerHTML = '<div class="alert alert-warning">Please fill out all fields before posting!</div>';
            return;
        }

        statusDiv.innerHTML = `<div class="alert alert-info">${isEditing ? 'Updating...' : 'Posting...'}</div>`;

        const jobData = {
            title: titleVal,
            requiredSkills: skillsVal,
            experienceRequired: expVal,
            description: descVal
        };

        const url = isEditing ? `/api/jobs/${currentEditId}` : '/api/jobs';
        const method = isEditing ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(jobData)
            });

            if (response.ok) {
                statusDiv.innerHTML = `<div class="alert alert-success">Job ${isEditing ? 'Updated' : 'Posted'} Successfully!</div>`;
                resetForm();
                fetchJobs();
            } else {
                statusDiv.innerHTML = '<div class="alert alert-danger">Error: Could not save job.</div>';
            }
        } catch (error) {
            statusDiv.innerHTML = '<div class="alert alert-danger">Server error.</div>';
        }
    }

    async function fetchJobs() {
        try {
            const response = await fetch('/api/jobs');
            const jobs = await response.json();
            const list = document.getElementById('jobList');
            list.innerHTML = '';

            jobs.forEach(job => {
                const li = document.createElement('li');
                li.className = 'list-group-item mt-3 shadow-sm border-0 bg-white rounded-3';

                const jobJson = JSON.stringify(job).replace(/"/g, '&quot;');

                li.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <strong style="font-size: 1.1rem;">${job.title}</strong><br>
                            <small class="text-muted">
                                📅 Posted: ${job.postedDate || 'Just now'} |
                                ⏳ ${job.experienceRequired} Yrs Experience
                            </small>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-info text-white" onclick="viewCandidates(${job.jobId})">View Candidates</button>
                            <button class="btn btn-sm btn-outline-primary" onclick="prepareEdit('${jobJson}')">Edit</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteJob(${job.jobId})">Delete</button>
                        </div>
                    </div>
                    <div id="candidates-for-${job.jobId}" class="mt-3 d-none"></div>
                `;
                list.appendChild(li);
            });
        } catch (error) {
            console.error("Fetch jobs error:", error);
        }
    }

    function prepareEdit(jobDataString) {
        const job = JSON.parse(jobDataString.replace(/&quot;/g, '"'));

        isEditing = true;
        currentEditId = job.jobId;

        document.getElementById('jobTitle').value = job.title;
        document.getElementById('skills').value = job.requiredSkills;
        document.getElementById('experience').value = job.experienceRequired;
        document.getElementById('description').value = job.description;

        const submitBtn = document.querySelector('button[onclick="saveJob()"]');
        submitBtn.innerText = "Update Job Vacancy";
        submitBtn.className = "btn btn-primary w-100";

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteJob(jobId) {
        if (!confirm("Are you sure you want to permanently delete this job post and all its applications?")) {
            return;
        }

        try {
            const response = await fetch(`/api/jobs/${jobId}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                fetchJobs();
            } else {
                alert("Failed to delete the job.");
            }
        } catch (error) {
            console.error("Delete error:", error);
        }
    }

    function resetForm() {
        isEditing = false;
        currentEditId = null;

        document.getElementById('jobTitle').value = '';
        document.getElementById('skills').value = '';
        document.getElementById('experience').value = '';
        document.getElementById('description').value = '';

        const submitBtn = document.querySelector('button[onclick="saveJob()"]');
        submitBtn.innerText = "Post Job Vacancy";
        submitBtn.className = "btn btn-success w-100";
    }

    async function viewCandidates(jobId) {
        const container = document.getElementById(`candidates-for-${jobId}`);

        if(!container.classList.contains('d-none')) {
            container.classList.add('d-none');
            return;
        }

        container.classList.remove('d-none');
        container.innerHTML = '<div class="text-primary mt-2">🔄 Fetching results from database...</div>';

        try {
            const response = await fetch(`/api/applications/job/${jobId}`);
            const applications = await response.json();

            if(applications.length === 0) {
                container.innerHTML = '<div class="alert alert-warning mt-2">No candidates found.</div>';
                return;
            }

            let html = `
            <style>
                .c-card { border-left: 5px solid #28a745 !important; margin-bottom: 20px !important; background: #fff; }
                .c-title { font-weight: bold; margin-bottom: 0; }
                .c-match { font-size: 0.95rem; font-weight: bold; padding: 8px 15px; border-radius: 8px; }
                .info-row { background-color: #f1f3f5; border-radius: 8px; padding: 15px; font-size: 0.9rem; }
                .info-col p { margin-bottom: 5px; color: #495057; }
                .info-col strong { color: #212529; }
                .ai-header { color: #007bff; font-weight: bold; margin-bottom: 5px; margin-top: 15px; display: flex; align-items: center; gap: 8px; }
                .ai-summary { color: #6c757d; font-style: italic; font-size: 0.9rem; margin-bottom: 15px; }
                .ai-reason strong { display: block; margin-bottom: 2px; }
            </style>
            <div class="mt-3">`;

            applications.forEach(app => {
                let matchClass = app.matchScore >= 70 ? 'bg-success text-white' : 'bg-warning text-dark';

                html += `
                <div class="card mb-3 shadow-sm border-0 c-card">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="card-title c-title text-capitalize">👤 ${app.candidateName}</h5>
                            <span class="badge ${matchClass} c-match">${app.matchScore}% Match</span>
                        </div>

                        <div class="info-row row mx-0">
                            <div class="col-md-6 info-col">
                                <p><strong>📧 Email:</strong> ${app.email || 'N/A'}</p>
                                <p><strong>📞 Phone:</strong> ${app.phone || 'N/A'}</p>
                            </div>
                            <div class="col-md-6 info-col border-start">
                                <p><strong>🎓 Edu:</strong> ${app.education || 'N/A'}</p>
                                <p><strong>🛠️ Skills:</strong> ${app.skills || 'N/A'}</p>
                            </div>
                        </div>

                        <div class="row mt-3 px-1 ai-reason">
                            <div class="col-12">
                                <h6 class="ai-header">🤖 AI Matching Analysis</h6>
                                <p class="ai-summary">${app.aiSummary || 'No summary available.'}</p>
                            </div>
                            <div class="col-md-6 mb-2">
                                <strong class="text-success small">✓ Why Hire:</strong>
                                <p class="small text-muted mb-0">${app.reasonSelect || 'N/A'}</p>
                            </div>
                            <div class="col-md-6 mb-2">
                                <strong class="text-danger small">⚠ Gaps:</strong>
                                <p class="small text-muted mb-0">${app.reasonCaution || 'N/A'}</p>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;

        } catch (error) {
            console.error("View Candidates Error:", error);
            container.innerHTML = '<div class="alert alert-danger">Error: Could not display results.</div>';
        }
    }


    function logout() {
        localStorage.clear();
        window.location.replace('login.html');
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
