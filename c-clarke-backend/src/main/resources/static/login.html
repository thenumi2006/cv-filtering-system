<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - C-CLARKE AI CV Filter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            background: white;
        }
        .btn-primary {
            background-color: #0d6efd;
            border: none;
            padding: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">C-CLARKE</h2>
        <p class="text-muted">AI CV Filtering System</p>
    </div>

    <div class="mb-3">
        <label for="username" class="form-label fw-bold">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Enter your username">
    </div>

    <div class="mb-4">
        <label for="password" class="form-label fw-bold">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter your password">
    </div>

    <button class="btn btn-primary w-100 mb-3" onclick="handleLogin()">Login</button>

    <div class="text-center small">
        <p class="mb-1">Don't have an account? <a href="register.html" class="text-decoration-none">Create Account</a></p>
    </div>
</div>

<script>
    async function handleLogin() {
        const usernameInput = document.getElementById('username').value.trim();
        const passwordInput = document.getElementById('password').value.trim();

        if (!usernameInput || !passwordInput) {
            alert("Please enter both username and password.");
            return;
        }

        const loginData = {
            username: usernameInput,
            password: passwordInput
        };

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(loginData)
            });

            if (response.ok) {
                const user = await response.json();

                localStorage.clear();

                localStorage.setItem('userId', user.id || user.userId);
                localStorage.setItem('userName', user.name);
                localStorage.setItem('userRole', user.role);

                console.log("Logged in as:", user.role);

                if (user.role === 'ADMIN') {
                    window.location.replace('hr-dashboard.html');
                } else if (user.role === 'CANDIDATE') {
                    window.location.replace('candidate-dashboard.html');
                } else {
                    alert("User role not recognized: " + user.role);
                }
            } else {
                const errorMsg = await response.text();
                alert("Login Failed: Incorrect username or password.");
            }
        } catch (error) {
            console.error("Error during login:", error);
            alert("Connection error. Is the Spring Boot backend running on port 8080?");
        }
    }

    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            handleLogin();
        }
    });
</script>

</body>
</html>
