<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HR Admin - Post Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card shadow p-4">
                <h2 class="mb-4">HR Admin: Create Job Vacancy</h2>
                <div class="mb-3">
                    <label class="form-label">Job Title</label>
                    <input type="text" id="jobTitle" class="form-control" placeholder="e.g. Java Developer">
                </div>
                <div class="mb-3">
                    <label class="form-label">Required Skills (Comma separated)</label>
                    <input type="text" id="skills" class="form-control" placeholder="Java, Spring Boot, MySQL">
                </div>
                <div class="mb-3">
                    <label class="form-label">Years of Experience</label>
                    <input type="number" id="experience" class="form-control" placeholder="2">
                </div>
                <div class="mb-3">
                    <label class="form-label">Full Job Description</label>
                    <textarea id="description" class="form-control" rows="5"></textarea>
                </div>
                <button class="btn btn-success w-100" onclick="saveJob()">Post Job Vacancy</button>
                <div id="status" class="mt-3"></div>
            </div>

            <div class="mt-5">
                <h3>Current Job Openings</h3>
                <ul id="jobList" class="list-group mt-3"></ul>
            </div>
        </div>
    </div>
</div>

<script>
    // Load existing jobs on page load
    window.onload = fetchJobs;

    async function saveJob() {
        const jobData = {
            title: document.getElementById('jobTitle').value,
            requiredSkills: document.getElementById('skills').value,
            experienceRequired: document.getElementById('experience').value,
            description: document.getElementById('description').value
        };

        const response = await fetch('/api/jobs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(jobData)
        });

        if (response.ok) {
            document.getElementById('status').innerHTML = '<div class="alert alert-success">Job Posted Successfully!</div>';
            fetchJobs(); // Refresh the list
        } else {
            document.getElementById('status').innerHTML = '<div class="alert alert-danger">Error saving job.</div>';
        }
    }

    async function fetchJobs() {
            const response = await fetch('/api/jobs');
            const jobs = await response.json();
            const list = document.getElementById('jobList');
            list.innerHTML = '';
            jobs.forEach(job => {
                const li = document.createElement('li');
                li.className = 'list-group-item';
                li.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center">
                        <strong>${job.title}</strong>
                        <button class="btn btn-sm btn-info" onclick="viewCandidates(${job.jobId})">View Candidates</button>
                    </div>
                    <div id="candidates-for-${job.jobId}" class="mt-2 ms-3 d-none"></div>
                `;
                list.appendChild(li);
            });
        }

        async function viewCandidates(jobId) {
            const container = document.getElementById(`candidates-for-${jobId}`);
            // Toggle visibility
            if(!container.classList.contains('d-none')) {
                container.classList.add('d-none');
                return;
            }

            container.classList.remove('d-none');
            container.innerHTML = '<span class="text-muted">Loading candidates...</span>';

            const response = await fetch(`/api/applications/job/${jobId}`);
            const applications = await response.json();

            if(applications.length === 0) {
                container.innerHTML = '<span class="text-danger small">No candidates have applied yet.</span>';
                return;
            }

            let html = '<ul class="list-group list-group-flush">';
            applications.forEach(app => {
                // Currently matchScore is null, we'll fix that next!
                let scoreDisplay = (app.matchScore !== undefined && app.matchScore !== null)
                   ? `<strong>${app.matchScore.toFixed(2)}%</strong>`
                   : `<span class="text-danger">Processing...</span>`;

html += `<li class="list-group-item bg-light">
            👤 ${app.candidateName}
            <span class="badge bg-primary float-end">Score: ${scoreDisplay}</span>
         </li>`;
            });
            html += '</ul>';
            container.innerHTML = html;
        }
</script>
</body>
</html>
