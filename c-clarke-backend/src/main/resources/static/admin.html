<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HR Admin - Post Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card shadow p-4">
                <h2 class="mb-4">HR Admin: Create Job Vacancy</h2>
                <div class="mb-3">
                    <label class="form-label">Job Title</label>
                    <input type="text" id="jobTitle" class="form-control" placeholder="e.g. Java Developer">
                </div>
                <div class="mb-3">
                    <label class="form-label">Required Skills (Comma separated)</label>
                    <input type="text" id="skills" class="form-control" placeholder="Java, Spring Boot, MySQL">
                </div>
                <div class="mb-3">
                    <label class="form-label">Years of Experience</label>
                    <input type="number" id="experience" class="form-control" placeholder="2">
                </div>
                <div class="mb-3">
                    <label class="form-label">Full Job Description</label>
                    <textarea id="description" class="form-control" rows="5"></textarea>
                </div>
                <button class="btn btn-success w-100" onclick="saveJob()">Post Job Vacancy</button>
                <div id="status" class="mt-3"></div>
            </div>

            <div class="mt-5">
                <h3>Current Job Openings</h3>
                <ul id="jobList" class="list-group mt-3"></ul>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    window.onload = fetchJobs;

    async function saveJob() {
        const statusDiv = document.getElementById('status');

        const titleVal = document.getElementById('jobTitle').value.trim();
        const skillsVal = document.getElementById('skills').value.trim();
        const expVal = document.getElementById('experience').value.trim();
        const descVal = document.getElementById('description').value.trim();

        if (!titleVal || !skillsVal || !expVal || !descVal) {
            statusDiv.innerHTML = '<div class="alert alert-warning">Please fill out all fields before posting!</div>';
            return;
        }

        statusDiv.innerHTML = '<div class="alert alert-info">Posting...</div>';

        const jobData = {
            title: titleVal,
            requiredSkills: skillsVal,
            experienceRequired: expVal,
            description: descVal
        };

        try {
            const response = await fetch('/api/jobs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(jobData)
            });

            if (response.ok) {
                statusDiv.innerHTML = '<div class="alert alert-success">Job Posted Successfully!</div>';

                document.getElementById('jobTitle').value = '';
                document.getElementById('skills').value = '';
                document.getElementById('experience').value = '';
                document.getElementById('description').value = '';

                fetchJobs();
            } else {
                statusDiv.innerHTML = '<div class="alert alert-danger">Error: Could not save job. Check backend logs.</div>';
            }
        } catch (error) {
            statusDiv.innerHTML = '<div class="alert alert-danger">Server error. Make sure Spring Boot is running.</div>';
        }
    }

    async function fetchJobs() {
        const response = await fetch('/api/jobs');
        const jobs = await response.json();
        const list = document.getElementById('jobList');
        list.innerHTML = '';

        jobs.forEach(job => {
            const li = document.createElement('li');
            li.className = 'list-group-item mt-2 shadow-sm';
            li.innerHTML = `
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <strong>${job.title}</strong><br>
                        <small class="text-muted">${job.experienceRequired} Yrs Experience</small>
                    </div>
                    <button class="btn btn-sm btn-info" onclick="viewCandidates(${job.jobId})">View Candidates</button>
                </div>
                <div id="candidates-for-${job.jobId}" class="mt-3 d-none"></div>
            `;
            list.appendChild(li);
        });
    }

    async function viewCandidates(jobId) {
    const container = document.getElementById(`candidates-for-${jobId}`);

    if (!container.classList.contains('d-none')) {
        container.classList.add('d-none');
        return;
    }

    container.classList.remove('d-none');
    container.innerHTML = '<span class="text-muted">Loading candidates...</span>';

    try {
        const response = await fetch(`/api/applications/job/${jobId}`);
        const applications = await response.json();

        if (applications.length === 0) {
            container.innerHTML = '<div class="alert alert-light small text-danger">No candidates have applied yet.</div>';
            return;
        }

        let html = '<div class="mt-2">';

        applications.forEach(app => {
            html += `
            <div class="card mb-3 shadow-sm border-start border-primary border-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between">
                        <h5>👤 ${app.candidateName}</h5>
                        <span class="badge ${app.matchScore > 70 ? 'bg-success' : 'bg-warning text-dark'}">
                            AI Match: ${app.matchScore}%
                        </span>
                    </div>

                    <div class="mt-3 p-3 bg-light rounded">
                        <h6>📄 Candidate Profile (Extracted from CV)</h6>
                        <div class="row small">
                            <div class="col-md-6">
                                <p class="mb-1"><strong>📧 Email:</strong> ${app.email || 'N/A'}</p>
                                <p class="mb-1"><strong>📞 Phone:</strong> ${app.phone || 'N/A'}</p>
                            </div>
                            <div class="col-md-6">
                                <p class="mb-1"><strong>🎓 Education:</strong> ${app.education || 'N/A'}</p>
                                <p class="mb-1"><strong>🛠️ Skills:</strong> ${app.skills || 'N/A'}</p>
                            </div>
                        </div>
                        <p class="small mt-2 mb-0"><strong>💼 Last Experience:</strong> ${app.workExperience || 'N/A'}</p>
                    </div>

                    <div class="mt-3">
                        <h6>🤖 AI Matching Logic</h6>
                        <p class="small text-muted mb-2"><em>${app.aiSummary}</em></p>
                        <div class="row">
                            <div class="col-6">
                                <p class="text-success small mb-0"><strong>✓ Strength:</strong></p>
                                <p class="small">${app.reasonSelect}</p>
                            </div>
                            <div class="col-6">
                                <p class="text-danger small mb-0"><strong>⚠ Gap:</strong></p>
                                <p class="small">${app.reasonCaution}</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        });

        html += '</div>';



    } catch (error) {
        console.error("Error fetching candidates:", error);
        container.innerHTML = '<div class="alert alert-danger small">Error loading candidates.</div>';
    }
}
</script>
</body>
</html>
