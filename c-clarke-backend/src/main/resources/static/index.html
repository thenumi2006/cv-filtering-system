<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C-CLARKE CV Filter - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">C-CLARKE AI Filter</a>
        <div id="authButtons">
            <a href="login.html" class="btn btn-outline-primary">Login</a>
            <a href="register.html" class="btn btn-primary">Register</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-4">Available Job Vacancies</h2>
    <div class="row" id="jobContainer"></div>

    <div id="applySection" class="card shadow-sm p-4 mt-5 d-none">
        <h4 id="applyTitle">Apply for Job</h4>
        <input type="hidden" id="selectedJobId">
        <div class="mb-3">
            <label>Your Name</label>
            <input type="text" id="candidateName" class="form-control" readonly>
            <small class="text-muted">Name loaded from your profile.</small>
        </div>
        <div class="mb-3">
            <label>Upload CV (PDF)</label>
            <input type="file" id="cvFile" class="form-control" accept=".pdf">
        </div>
        <button class="btn btn-primary w-100" onclick="submitApplication()">Submit Application</button>
        <div id="applyStatus" class="mt-3"></div>
    </div>
</div>

<script>
    window.onload = function() {
        fetchAvailableJobs();
        checkUserStatus();
    };

    function checkUserStatus() {
        const userName = localStorage.getItem('userName');
        if (userName) {
            document.getElementById('authButtons').innerHTML = `
                <span class="me-3">Welcome, ${userName}</span>
                <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            `;

            document.getElementById('candidateName').value = userName;
        }
    }

    async function fetchAvailableJobs() {
        const response = await fetch('/api/jobs');
        const jobs = await response.json();
        const container = document.getElementById('jobContainer');
        container.innerHTML = '';

        jobs.forEach(job => {
            container.innerHTML += `
                <div class="col-md-6 mb-3">
                    <div class="card p-3 h-100 shadow-sm">
                        <h5>${job.title}</h5>
                        <p class="text-muted small">${job.description}</p>
                        <button class="btn btn-outline-primary mt-auto" onclick="openApplyForm(${job.id}, '${job.title}')">Apply Now</button>
                    </div>
                </div>
            `;
        });
    }

    function openApplyForm(jobId, jobTitle) {

        if (!localStorage.getItem('userId')) {
            alert("You must be logged in to upload your CV.");
            window.location.href = 'login.html';
            return;
        }

        document.getElementById('applySection').classList.remove('d-none');
        document.getElementById('selectedJobId').value = jobId;
        document.getElementById('applyTitle').innerText = 'Applying for: ' + jobTitle;

        document.getElementById('applySection').scrollIntoView({ behavior: 'smooth' });
    }

    async function submitApplication() {
        const jobId = document.getElementById('selectedJobId').value;
        const name = document.getElementById('candidateName').value;
        const userId = localStorage.getItem('userId');
        const fileInput = document.getElementById('cvFile');

        if (fileInput.files.length === 0) return alert("Please select your CV PDF file");

        const formData = new FormData();
        formData.append("jobId", jobId);
        formData.append("candidateName", name);
        formData.append("userId", userId);
        formData.append("file", fileInput.files[0]);

        document.getElementById('applyStatus').innerHTML = '<div class="alert alert-info">Analyzing your CV... please wait.</div>';

        const response = await fetch('/api/applications/apply', {
            method: 'POST',
            body: formData
        });

        if(response.ok) {
            document.getElementById('applyStatus').innerHTML = '<div class="alert alert-success">Application submitted!</div>';
            fileInput.value = '';
        }
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }
</script>
</body>
</html>
