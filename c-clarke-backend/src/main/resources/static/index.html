<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C-CLARKE CV Filter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="text-center mb-4">C-CLARKE AI CV Filtering System</h2>

    <div class="card shadow-sm p-4">
        <h4>Candidate: Upload your CV (PDF)</h4>
        <p class="text-muted">The system will analyze your skills automatically[cite: 41].</p>
        <div class="mb-3">
            <input class="form-control" type="file" id="cvFile">
        </div>
        <button class="btn btn-primary" onclick="uploadFile()">Upload & Analyze</button>
        <div id="result" class="mt-4 alert alert-info d-none"></div>
    </div>
</div>

<script>
    async function uploadFile() {
        const fileInput = document.getElementById('cvFile');
        const resultDiv = document.getElementById('result');

        if (fileInput.files.length === 0) return alert("Please select a file");

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        resultDiv.classList.remove('d-none');
        resultDiv.innerText = "Analyzing...";

        const response = await fetch('/api/cv/upload', {
            method: 'POST',
            body: formData
        });

        const text = await response.text();
        resultDiv.innerText = text;
    }
</script>
</body>
</html>
