<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C-CLARKE CV Filter - Candidate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="text-center mb-4">Available Job Vacancies</h2>
    <div class="row" id="jobContainer">
    </div>

    <div id="applySection" class="card shadow-sm p-4 mt-5 d-none">
        <h4 id="applyTitle">Apply for Job</h4>
        <input type="hidden" id="selectedJobId">
        <div class="mb-3">
            <label>Your Name</label>
            <input type="text" id="candidateName" class="form-control">
        </div>
        <div class="mb-3">
            <label>Upload CV (PDF)</label>
            <input type="file" id="cvFile" class="form-control">
        </div>
        <button class="btn btn-primary" onclick="submitApplication()">Submit Application</button>
        <div id="applyStatus" class="mt-3"></div>
    </div>
</div>

<script>
    window.onload = fetchAvailableJobs;

    async function fetchAvailableJobs() {
        const response = await fetch('/api/jobs');
        const jobs = await response.json();
        const container = document.getElementById('jobContainer');
        container.innerHTML = '';

        jobs.forEach(job => {
            container.innerHTML += `
                <div class="col-md-6 mb-3">
                    <div class="card p-3">
                        <h5>${job.title} <span class="badge bg-secondary fs-6 float-end">${job.experienceRequired} Yrs Exp</span></h5>
                        <p class="text-muted small">Skills: ${job.requiredSkills}</p>
                        <button class="btn btn-outline-primary btn-sm" onclick="openApplyForm(${job.jobId}, '${job.title}')">Apply Now</button>
                    </div>
                </div>
            `;
        });
    }

    function openApplyForm(jobId, jobTitle) {
        document.getElementById('applySection').classList.remove('d-none');
        document.getElementById('selectedJobId').value = jobId;
        document.getElementById('applyTitle').innerText = 'Applying for: ' + jobTitle;
    }

    async function submitApplication() {
        const jobId = document.getElementById('selectedJobId').value;
        const name = document.getElementById('candidateName').value;
        const fileInput = document.getElementById('cvFile');

        if (!name || fileInput.files.length === 0) return alert("Please fill all fields");

        const formData = new FormData();
        formData.append("jobId", jobId);
        formData.append("candidateName", name);
        formData.append("file", fileInput.files[0]);

        document.getElementById('applyStatus').innerHTML = '<div class="alert alert-info">Uploading and extracting text...</div>';

        const response = await fetch('/api/applications/apply', {
            method: 'POST',
            body: formData
        });

        if(response.ok) {
            document.getElementById('applyStatus').innerHTML = '<div class="alert alert-success">Application submitted successfully!</div>';
        }
    }
</script>
</body>
</html>
