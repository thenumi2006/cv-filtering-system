<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candidate Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-top: 50px; }
        .register-container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="register-container shadow">
    <h2 class="text-center mb-4">Create Candidate Account</h2>

    <form id="registerForm">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Birthday</label>
                <input type="date" class="form-control" id="birthday" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Home Address</label>
            <textarea class="form-control" id="address" rows="2" required></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Profile Photo URL </label>
            <input type="text" class="form-control" id="photo" placeholder="e.g., https://link-to-photo.jpg">
            <small class="text-muted">For this prototype, provide a link to an image.</small>
        </div>

        <hr>

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" id="reg_username" required>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="reg_password" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password" required>
            </div>
        </div>

        <button type="button" class="btn btn-success w-100" onclick="handleRegister()">Register Now</button>
        <p class="text-center mt-3">Already have an account? <a href="login.html">Login here</a></p>
    </form>
</div>

<script>
    async function handleRegister() {
        const password = document.getElementById('reg_password').value;
        const confirm = document.getElementById('confirm_password').value;

        if (password !== confirm) {
            alert("Passwords do not match!");
            return;
        }

        const userData = {
            name: document.getElementById('name').value,
            birthday: document.getElementById('birthday').value,
            email: document.getElementById('email').value,
            address: document.getElementById('address').value,
            profilePhotoPath: document.getElementById('photo').value,
            username: document.getElementById('reg_username').value,
            password: password
        };

        const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        });

        if (response.ok) {
            alert("Registration successful! You can now login.");
            window.location.href = 'login.html';
        } else {
            const error = await response.text();
            alert("Error: " + error);
        }
    }
</script>
</body>
</html>
